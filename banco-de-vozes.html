<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banco de Vozes Premium | A Locução</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0b0f19; /* Fundo dark ultra moderno */
            color: #f3f4f6;
        }
        /* Customização sutil da barra de rolagem */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0b0f19; }
        ::-webkit-scrollbar-thumb { background: #1f2937; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #374151; }
    </style>
</head>
<body class="min-h-screen antialiased pb-24">

    <header class="border-b border-gray-800 bg-gray-900/50 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
            <div>
                <h1 class="text-2xl font-bold bg-gradient-to-r align-middle from-violet-400 to-indigo-500 bg-clip-text text-transparent">
                    <i class="fa-solid fa-microphone-lines mr-2 text-indigo-400"></i>Banco de Vozes Personalizado
                </h1>
                <p class="text-xs text-gray-400 mt-1">Selecione e gerencie as melhores vozes para seus projetos</p>
            </div>
            
            <div class="relative w-full md:w-80">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-gray-500">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </span>
                <input type="search" id="inputPesquisa" 
                    class="w-full pl-10 pr-4 py-2 text-sm bg-gray-900 border border-gray-700 rounded-xl focus:outline-none focus:border-indigo-500 text-gray-200 transition-colors" 
                    placeholder="Buscar locutor...">
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 mt-8">
        <div class="bg-gray-900/40 border border-gray-800/80 rounded-2xl p-4 mb-8 flex flex-col lg:flex-row lg:items-center justify-between gap-6">
            
            <div class="flex flex-wrap items-center gap-2">
                <span class="text-xs font-semibold text-gray-400 uppercase tracking-wider mr-2">Voz:</span>
                <button data-filter="all" class="btn-filter-tipo px-4 py-1.5 rounded-xl text-xs font-medium transition-all bg-indigo-600 text-white shadow-lg shadow-indigo-600/20">Todas</button>
                <button data-filter="masculina" class="btn-filter-tipo px-4 py-1.5 rounded-xl text-xs font-medium transition-all bg-gray-800/60 text-gray-400 hover:text-white hover:bg-gray-800">Masculina</button>
                <button data-filter="feminina" class="btn-filter-tipo px-4 py-1.5 rounded-xl text-xs font-medium transition-all bg-gray-800/60 text-gray-400 hover:text-white hover:bg-gray-800">Feminina</button>
                <button data-filter="infantil" class="btn-filter-tipo px-4 py-1.5 rounded-xl text-xs font-medium transition-all bg-gray-800/60 text-gray-400 hover:text-white hover:bg-gray-800">Infantil</button>
            </div>

            <div class="flex flex-wrap items-center gap-2">
                <span class="text-xs font-semibold text-gray-400 uppercase tracking-wider mr-2">Disponibilidade:</span>
                <button data-status="all" class="btn-filter-status px-4 py-1.5 rounded-xl text-xs font-medium transition-all bg-indigo-600 text-white shadow-lg shadow-indigo-600/20">Todos</button>
                <button data-status="online" class="btn-filter-status px-4 py-1.5 rounded-xl text-xs font-medium transition-all bg-gray-800/60 text-gray-400 hover:text-emerald-400 hover:bg-gray-800"><span class="w-2 h-2 inline-block bg-emerald-500 rounded-full mr-1.5 animate-pulse"></span>Online</button>
                <button data-status="10min" class="btn-filter-status px-4 py-1.5 rounded-xl text-xs font-medium transition-all bg-gray-800/60 text-gray-400 hover:text-rose-400 hover:bg-gray-800">10 Min</button>
                <button data-status="30min" class="btn-filter-status px-4 py-1.5 rounded-xl text-xs font-medium transition-all bg-gray-800/60 text-gray-400 hover:text-amber-400 hover:bg-gray-800">30 Min</button>
            </div>
        </div>

        <div id="gridLocutores" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </main>

    <div id="playerFixo" class="fixed bottom-0 left-0 right-0 bg-gray-900/95 backdrop-blur-lg border-t border-gray-800 py-3 px-6 transform translate-y-full transition-transform duration-300 z-50 shadow-2xl">
        <div class="max-w-7xl mx-auto flex items-center justify-between gap-4">
            <div class="flex items-center gap-3 w-1/3 min-w-[150px]">
                <img id="playerImg" src="" class="w-10 h-10 rounded-lg object-cover border border-gray-700" alt="">
                <div class="overflow-hidden">
                    <h4 id="playerNome" class="text-sm font-semibold text-white truncate">Selecionado</h4>
                    <p id="playerEstilo" class="text-xs text-gray-400 truncate">Estilo da voz</p>
                </div>
            </div>
            
            <div class="flex flex-col items-center gap-1 w-1/3">
                <div class="flex items-center gap-4">
                    <button id="btnVoltar10" class="text-gray-400 hover:text-white transition-colors"><i class="fa-solid fa-backward-step"></i></button>
                    <button id="btnPlayMaster" class="w-10 h-10 bg-indigo-500 hover:bg-indigo-600 text-white rounded-full flex items-center justify-center transition-transform hover:scale-105 shadow-md"><i class="fa-solid fa-play ml-0.5"></i></button>
                    <button id="btnAvancar10" class="text-gray-400 hover:text-white transition-colors"><i class="fa-solid fa-forward-step"></i></button>
                </div>
                <div class="w-full flex items-center gap-2">
                    <span id="tempoAtual" class="text-[10px] text-gray-500 font-mono">00:00</span>
                    <input type="range" id="barraProgresso" value="0" class="w-full h-1 bg-gray-700 rounded-lg appearance-none cursor-pointer accent-indigo-500">
                    <span id="tempoTotal" class="text-[10px] text-gray-500 font-mono">00:00</span>
                </div>
            </div>

            <div class="w-1/3 flex justify-end">
                <button id="btnPlayerOrcamento" class="px-4 py-2 bg-emerald-600 hover:bg-emerald-700 text-white rounded-xl text-xs font-semibold flex items-center gap-2 transition-colors shadow-lg shadow-emerald-600/10">
                    <i class="fa-brands fa-whatsapp text-sm"></i> <span class="hidden sm:inline">Solicitar Locução</span>
                </button>
            </div>
        </div>
    </div>

    <audio id="audioGlobal"></audio>

    <script>
        // Dados brutos extraídos do seu HTML original
        const locutores = [
            {
                nome: "Alessandro Peixoto",
                foto: "https://hd.paineldegravacao.com.br/perfil/0693395001776198709.jpeg",
                audio: "https://paineldegravacao.com.br/player/play/Alessandro_Peixoto/2/4118",
                tipo: "masculina",
                status: "10min"
            },
            {
                nome: "Alexandre Silva",
                foto: "https://hd.paineldegravacao.com.br/perfil/01004925001736440537.jpeg",
                audio: "https://paineldegravacao.com.br/player/play/Alexandre_Silva/2/4488",
                tipo: "masculina",
                status: "online"
            },
            {
                nome: "Bruna K",
                foto: "https://hd.paineldegravacao.com.br/perfil/04337222001712242131.png",
                audio: "https://paineldegravacao.com.br/player/play/Bruna_K/2/4397",
                tipo: "feminina",
                status: "30min"
            }
            // Você pode colar os outros locutores aqui seguindo este mesmo padrão de objeto
        ];

        // Estado do App
        let filtroTipo = 'all';
        let filtroStatus = 'all';
        let termoPesquisa = '';
        let locutorAtual = null;

        // Elementos DOM
        const grid = document.getElementById('gridLocutores');
        const audio = document.getElementById('audioGlobal');
        const playerFixo = document.getElementById('playerFixo');
        const btnPlayMaster = document.getElementById('btnPlayMaster');

        // Renderizador de Cards
        function renderizarCards() {
            grid.innerHTML = '';
            
            const filtrados = locutores.filter(l => {
                const bateTipo = filtroTipo === 'all' || l.tipo === filtroTipo;
                const bateStatus = filtroStatus === 'all' || l.status === filtroStatus;
                const bateNome = l.nome.toLowerCase().includes(termoPesquisa.toLowerCase());
                return bateTipo && bateStatus && bateNome;
            });

            if(filtrados.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-12 text-gray-500">Nenhum locutor encontrado com estes filtros.</div>`;
                return;
            }

            filtrados.forEach((locutor, index) => {
                const statusConfig = {
                    online: { cor: 'text-emerald-400 bg-emerald-500/10 border-emerald-500/20', label: 'Online' },
                    '10min': { cor: 'text-rose-400 bg-rose-500/10 border-rose-500/20', label: '10 Min' },
                    '30min': { cor: 'text-amber-400 bg-amber-500/10 border-amber-500/20', label: '30 Min' }
                }[locutor.status] || { cor: 'text-gray-400 bg-gray-500/10 border-gray-500/20', label: 'Indisponível' };

                const card = document.createElement('div');
                card.className = "bg-gray-900/60 border border-gray-800/80 hover:border-indigo-500/40 rounded-2xl p-5 flex flex-col justify-between transition-all duration-300 hover:shadow-xl hover:shadow-indigo-500/5 group relative overflow-hidden";
                
                const estaTocandoEste = locutorAtual && locutorAtual.audio === locutor.audio && !audio.paused;

                card.innerHTML = `
                    <div>
                        <div class="flex items-start justify-between gap-4">
                            <div class="flex items-center gap-3">
                                <div class="relative">
                                    <img src="${locutor.foto}" class="w-14 h-14 rounded-full object-cover border-2 border-gray-800 group-hover:border-indigo-500/50 transition-colors" alt="${locutor.nome}">
                                    ${locutor.status === 'online' ? '<span class="absolute bottom-0 right-0 w-3.5 h-3.5 bg-emerald-500 border-2 border-gray-900 rounded-full"></span>' : ''}
                                </div>
                                <div>
                                    <h3 class="font-bold text-white group-hover:text-indigo-400 transition-colors text-base">${locutor.nome}</h3>
                                    <span class="inline-block text-[10px] uppercase tracking-wider text-gray-400 mt-0.5 font-medium">${locutor.tipo}</span>
                                </div>
                            </div>
                            <span class="text-[11px] font-medium px-2.5 py-1 rounded-lg border ${statusConfig.cor}">
                                ${statusConfig.label}
                            </span>
                        </div>
                    </div>

                    <div class="mt-6 flex items-center justify-between pt-4 border-t border-gray-800/60">
                        <button onclick="controlarAudio('${locutor.audio}', ${index})" class="flex items-center gap-2 text-xs font-semibold px-4 py-2 rounded-xl transition-all ${estaTocandoEste ? 'bg-amber-500 text-slate-950' : 'bg-indigo-500/10 text-indigo-400 hover:bg-indigo-500 hover:text-white'}">
                            <i class="fa-solid ${estaTocandoEste ? 'fa-pause' : 'fa-play'} text-xs"></i>
                            <span>${estaTocandoEste ? 'Pausar' : 'Ouvir Demo'}</span>
                        </button>

                        <a href="https://wa.me/5528999999999?text=Olá,%20gostei%20da%20voz%20de%20${encodeURIComponent(locutor.nome)}" target="_blank" 
                           class="w-9 h-9 bg-gray-800 hover:bg-emerald-600 text-gray-400 hover:text-white rounded-xl flex items-center justify-center transition-colors">
                            <i class="fa-brands fa-whatsapp text-lg"></i>
                        </a>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Lógica de Áudio Global
        function controlarAudio(url, index) {
            const locutor = locutores[index];

            if (locutorAtual && locutorAtual.audio === url) {
                if (audio.paused) {
                    audio.play();
                } else {
                    audio.pause();
                }
            } else {
                locutorAtual = locutor;
                audio.src = url;
                audio.play();
                atualizarBarraPlayerFixo();
            }
            renderizarCards();
            atualizarIconeMaster();
        }

        function atualizarBarraPlayerFixo() {
            if (!locutorAtual) return;
            document.getElementById('playerImg').src = locutorAtual.foto;
            document.getElementById('playerNome').textContent = locutorAtual.nome;
            document.getElementById('playerEstilo').textContent = `Perfil: ${locutorAtual.tipo.toUpperCase()}`;
            playerFixo.classList.remove('translate-y-full');
        }

        function atualizarIconeMaster() {
            if (audio.paused) {
                btnPlayMaster.innerHTML = `<i class="fa-solid fa-play ml-0.5"></i>`;
            } else {
                btnPlayMaster.innerHTML = `<i class="fa-solid fa-pause"></i>`;
            }
        }

        // Eventos e Sincronização do Player
        audio.addEventListener('play', () => { renderizarCards(); atualizarIconeMaster(); });
        audio.addEventListener('pause', () => { renderizarCards(); atualizarIconeMaster(); });
        btnPlayMaster.addEventListener('click', () => {
            if(audio.src) {
                if(audio.paused) audio.play();
                else audio.pause();
            }
        });

        // Barra de progresso do Player Estilo Spotify
        const barraProgresso = document.getElementById('barraProgresso');
        const tempoAtual = document.getElementById('tempoAtual');
        const tempoTotal = document.getElementById('tempoTotal');

        audio.addEventListener('timeupdate', () => {
            if (!isNaN(audio.duration)) {
                const valor = (audio.currentTime / audio.duration) * 100;
                barraProgresso.value = valor;
                tempoAtual.textContent = formatarTempo(audio.currentTime);
                tempoTotal.textContent = formatarTempo(audio.duration);
            }
        });

        barraProgresso.addEventListener('input', () => {
            const tempo = (barraProgresso.value / 100) * audio.duration;
            audio.currentTime = tempo;
        });

        function formatarTempo(segundos) {
            const min = Math.floor(segundos / 60);
            const seg = Math.floor(segundos % 60);
            return `${min.toString().padStart(2, '0')}:${seg.toString().padStart(2, '0')}`;
        }

        // Eventos de Filtro Superior Dinâmico
        document.querySelectorAll('.btn-filter-tipo').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.btn-filter-tipo').forEach(b => b.className = "btn-filter-tipo px-4 py-1.5 rounded-xl text-xs font-medium transition-all bg-gray-800/60 text-gray-400 hover:text-white hover:bg-gray-800");
                e.currentTarget.className = "btn-filter-tipo px-4 py-1.5 rounded-xl text-xs font-medium transition-all bg-indigo-600 text-white shadow-lg shadow-indigo-600/20";
                filtroTipo = e.currentTarget.getAttribute('data-filter');
                renderizarCards();
            });
        });

        document.querySelectorAll('.btn-filter-status').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.btn-filter-status').forEach(b => b.className = "btn-filter-status px-4 py-1.5 rounded-xl text-xs font-medium transition-all bg-gray-800/60 text-gray-400 hover:bg-gray-800");
                e.currentTarget.className = "btn-filter-status px-4 py-1.5 rounded-xl text-xs font-medium transition-all bg-indigo-600 text-white shadow-lg shadow-indigo-600/20";
                filtroStatus = e.currentTarget.getAttribute('data-status');
                renderizarCards();
            });
        });

        document.getElementById('inputPesquisa').addEventListener('input', (e) => {
            termoPesquisa = e.target.value;
            renderizarCards();
        });

        // Inicialização
        renderizarCards();
    </script>
</body>
</html>
