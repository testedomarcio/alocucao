    <script>
        // Lógica do Menu Mobile
        const menuToggle = document.getElementById('menu-toggle');
        const mobileMenu = document.getElementById('mobile-menu');
        const icon = menuToggle.querySelector('i');

        menuToggle.addEventListener('click', () => {
            mobileMenu.classList.toggle('active');
            if (mobileMenu.classList.contains('active')) {
                icon.classList.remove('fa-bars');
                icon.classList.add('fa-times');
            } else {
                icon.classList.remove('fa-times');
                icon.classList.add('fa-bars');
            }
        });

        // Lógica do Loader do Iframe
        const iframe = document.getElementById('painel-iframe');
        const loader = document.getElementById('iframe-loader');

        // Quando o iframe terminar de carregar, escondemos o loader e mostramos o painel suavemente
        iframe.onload = function() {
            loader.style.opacity = '0';
            iframe.classList.add('loaded');
            
            // Remove o loader do DOM após a transição para não interferir em cliques
            setTimeout(() => {
                loader.style.visibility = 'hidden';
            }, 500);
        };
    </script>
