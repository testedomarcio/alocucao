<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Estúdio A Locução - Painel de Gravação</title>
    <meta name="description" content="Acesse o painel de gravação do Estúdio A Locução. Grave seus offs e spots comerciais em minutos.">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">

    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Impede scroll na página pai para focar no iframe */
        }
        
        .logo-img { max-height: 50px; width: auto; }
        
        .btn-primary { 
            background: #22d3ee; 
            transition: all 0.3s ease; 
        }
        .btn-primary:hover { 
            background: #0891b2; 
            transform: translateY(-2px); 
        }

        /* Mobile menu transitions */
        #mobile-menu {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
        }
        #mobile-menu.active {
            max-height: 500px;
        }

        .container-custom {
            max-width: 1280px;
            margin-left: auto;
            margin-right: auto;
            padding-left: 1.5rem;
            padding-right: 1.5rem;
        }

        /* Estilização do Iframe */
        .iframe-container {
            flex-grow: 1; /* Ocupa todo o espaço restante */
            width: 100%;
            border: none;
            background-color: #f8fafc;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <!-- Header / Navbar (Extraído do código original) -->
    <header class="bg-slate-900 text-white shadow-xl relative z-50">
        <nav class="container-custom py-4">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <a href="/">
                        <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEj_sBFI94b0Jhnsl6DY4UwsTOpsmltn1MNvF5n6zcrkdLUd7oqFJfxF5NAtCEwBchu-b65jEsMXi60X2SlPb04XheC1fuEaG-sRzEbENAbN4eMSX5YHbdk6oGhfGTHQOPR1tZJn_GwXOAjUL6UX4ZvpVITZOL6is83xruSEkk343d-9VEx5osefurjX8aY/s1600/logo.png" alt="Estúdio A Locução Logo" class="logo-img">
                    </a>
                </div>
                
                <!-- Desktop Menu -->
                <div class="hidden lg:flex space-x-6 font-medium text-sm uppercase tracking-wider">
                    <a href="/" class="hover:text-cyan-400 transition">Início</a>
                    <a href="/servicos" class="hover:text-cyan-400 transition">Serviços</a>
                    <a href="/#vozes-mais-pedidas" class="hover:text-cyan-400 transition">Locutores</a>
                    <a href="/#precos" class="hover:text-cyan-400 transition">Preços</a>
                    <a href="https://www.alocucao.com.br/termos" class="hover:text-cyan-400 transition">Termos</a>
                </div>

                <div class="flex items-center gap-4">
                    <a href="https://paineldegravacao.com.br/comerciaistop/" class="hidden lg:block text-sm font-bold border border-cyan-400 px-4 py-2 rounded-full bg-cyan-400 text-slate-900 transition uppercase">LOGIN</a>
                    <a href="https://paineldegravacao.com.br/alocucao/cadastro" target="_blank" class="hidden sm:block btn-primary text-slate-900 font-bold px-6 py-2 rounded-full shadow-lg text-sm uppercase tracking-tighter">CADASTRE-SE</a>
                    
                    <button id="menu-toggle" class="lg:hidden text-2xl text-cyan-400 focus:outline-none">
                        <i class="fas fa-bars"></i>
                    </button>
                </div>
            </div>

            <!-- Mobile Menu -->
            <div id="mobile-menu" class="lg:hidden">
                <div class="flex flex-col space-y-4 pt-6 pb-4 border-t border-slate-800 mt-4">
                    <a href="/" class="text-slate-300 hover:text-cyan-400 py-2 transition uppercase text-sm font-bold">Início</a>
                    <a href="/servicos" class="text-slate-300 hover:text-cyan-400 py-2 transition uppercase text-sm font-bold">Serviços</a>
                    <a href="/#vozes-mais-pedidas" class="text-slate-300 hover:text-cyan-400 py-2 transition uppercase text-sm font-bold">Locutores</a>
                    <a href="/#precos" class="text-slate-300 hover:text-cyan-400 py-2 transition uppercase text-sm font-bold">Preços</a>
                    <a href="https://paineldegravacao.com.br/comerciaistop/" class="bg-cyan-400 text-slate-900 text-center py-3 rounded-xl font-bold uppercase text-xs">LOGIN</a>
                    <a href="https://paineldegravacao.com.br/alocucao/cadastro" target="_blank" class="btn-primary text-slate-900 text-center py-3 rounded-xl font-bold uppercase text-xs">CADASTRE-SE</a>
                </div>
            </div>
        </nav>
    </header>

    <!-- Iframe Area -->
    <main class="iframe-container">
        <iframe 
            src="https://paineldegravacao.com.br/comerciaistop/" 
            title="Painel de Gravação Comercial Top"
            allow="autoplay; clipboard-write; microphone"
            loading="lazy">
        </iframe>
    </main>

    <script>
        // Lógica do Menu Mobile
        const menuToggle = document.getElementById('menu-toggle');
        const mobileMenu = document.getElementById('mobile-menu');
        const icon = menuToggle.querySelector('i');

        menuToggle.addEventListener('click', () => {
            mobileMenu.classList.toggle('active');
            if (mobileMenu.classList.contains('active')) {
                icon.classList.remove('fa-bars');
                icon.classList.add('fa-times');
            } else {
                icon.classList.remove('fa-times');
                icon.classList.add('fa-bars');
            }
        });
    </script>
</body>
</html>
